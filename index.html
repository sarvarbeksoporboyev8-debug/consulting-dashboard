<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Грант Консалтинг — Кириш</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <span class="logo-mark">GC</span>
      <span class="logo-text">Grant Consulting</span>
    </div>
    <h1 class="login-title">Бошқарув панели</h1>
    <p class="login-subtitle">Сайт мазмунини бошқариш учун киринг.</p>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="password">Парол</label>
        <input type="password" id="password" name="password" placeholder="Паролни киритинг" required autofocus>
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Кириш</button>
      <p class="form-error" id="login-error" style="display:none;"></p>
    </form>
  </div>
  <script>
    if (localStorage.getItem('gc_token')) window.location.href = '/dashboard.html';

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Кирилмоқда…';
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('gc_token', data.token);
          window.location.href = '/dashboard.html';
        } else {
          errEl.textContent = 'Нотўғри парол. Қайта уриниб кўринг.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Кириш';
        }
      } catch {
        errEl.textContent = 'Уланиш хатоси. Илтимос, қайта уриниб кўринг.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Кириш';
      }
    });
  </script>
</body>
</html>
